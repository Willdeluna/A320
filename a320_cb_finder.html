<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A319/A320 Circuit Breaker Finder</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:16px; font-family:Arial, sans-serif; background:#000; color:orange; }
  h1 { margin:0 0 16px; text-align:center; font-size:1.5rem; letter-spacing:2px; }
  .controls { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; margin-bottom:14px; }
  #searchBox { flex:1 1 360px; max-width:600px; padding:12px; font-size:1rem; background:#111; color:orange; border:1px solid orange; border-radius:8px; }
  #searchBox::placeholder { color:#ffb84d; opacity:0.7; }
  #panelFilter, #ataFilter, #clearBtn { padding:10px 14px; font-size:0.95rem; background:#111; color:orange; border:1px solid orange; border-radius:8px; cursor:pointer; }
  #clearBtn:hover, #panelFilter:hover, #ataFilter:hover { background:#1a1a1a; }
  #countLabel { color:#ffd27f; text-align:center; margin-bottom:12px; font-size:0.9rem; }
  .layout { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.1fr); gap:18px; }
  @media (max-width:1100px){ .layout{ grid-template-columns:1fr; } }
  .panel-section { border:1px solid orange; border-radius:10px; background:#0b0b0b; padding:14px; }
  .panel-section h2 { margin:0 0 12px; font-size:1.1rem; letter-spacing:1.5px; color:orange; display:flex; justify-content:space-between; align-items:center; }
  .enlarge-btn { font-size:0.85rem; background:#1a1100; color:orange; border:1px solid orange; border-radius:5px; padding:5px 10px; cursor:pointer; font-weight:normal; letter-spacing:0; }
  .enlarge-btn:hover { background:#2a1a00; }
  .table-wrap { max-height:70vh; overflow:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.84rem; }
  thead th { text-align:left; padding:8px 6px; background:#1a1100; color:orange; border-bottom:1px solid orange; position:sticky; top:0; z-index:1; }
  tbody td { padding:6px; border-bottom:1px solid rgba(255,165,0,0.18); color:#ffe4b3; vertical-align:top; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:#1a1100; }
  tbody tr.active { background:#2a1a00; }
  .panel-tag { display:inline-block; padding:2px 6px; background:#2a1a00; border:1px solid orange; border-radius:4px; color:orange; font-weight:bold; font-size:0.78rem; white-space:nowrap; }
  .pos-tag { display:inline-block; padding:2px 6px; background:#0b0b0b; border:1px solid #ffb84d; border-radius:4px; color:#ffd27f; font-weight:bold; font-size:0.78rem; white-space:nowrap; }
  .fin-tag { display:inline-block; padding:2px 6px; background:#0b0b0b; border:1px solid #6f9018; border-radius:4px; color:#cfe07f; font-weight:bold; font-size:0.76rem; white-space:nowrap; }
  .ata-tag { display:inline-block; padding:2px 6px; background:#0b0b0b; border:1px solid #6f5018; border-radius:4px; color:#ffb84d; font-size:0.74rem; white-space:nowrap; }
  .inop { color:#ff6b6b; font-weight:bold; font-size:0.72rem; margin-left:4px; }
  .tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .tab { padding:6px 11px; font-size:0.82rem; background:#111; color:#ffb84d; border:1px solid #6f5018; border-radius:6px; cursor:pointer; }
  .tab:hover { background:#1a1100; }
  .tab.active { background:#2a1a00; color:orange; border-color:orange; font-weight:bold; }
  .panel-display { border:1px solid orange; border-radius:8px; background:#0b0b0b; padding:8px; cursor:zoom-in; overflow:auto; }
  .panel-display svg { display:block; width:100%; height:auto; }
  .panel-note { color:#9c7028; font-size:0.78rem; font-style:italic; margin-top:8px; text-align:center; }
  .cb { fill:orange; }
  .cb-empty { fill:none; stroke:rgba(255,165,0,0.30); stroke-width:1; }
  .cb.highlight { fill:#ff2020 !important; stroke:#ffff00; stroke-width:3; transform-box:fill-box; transform-origin:center; }
  .dotlabel { fill:#ffe4b3; font-size:7px; text-anchor:middle; }
  .axis { fill:#ffb84d; font-size:11px; text-anchor:middle; }
  .axis-bold { fill:#ffb84d; font-size:12px; text-anchor:middle; font-weight:bold; }
  .highlight-callout { fill:#fff; font-size:14px; font-weight:bold; font-family:Arial, sans-serif; text-anchor:middle; paint-order:stroke; stroke:#000; stroke-width:4px; stroke-linejoin:round; }
  .highlight-callout-bg { fill:rgba(255,32,32,0.95); stroke:#ffff00; stroke-width:1.5; }
  @keyframes cbpulse { 0%,100%{ transform:scale(1); filter:drop-shadow(0 0 4px #ff2020); } 50%{ transform:scale(1.6); filter:drop-shadow(0 0 12px #ff5050); } }
  .cb.highlight { animation:cbpulse 1.2s ease-in-out infinite; }
  #modal { display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.94); padding:16px; flex-direction:column; }
  #modal.open { display:flex; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; color:orange; margin-bottom:10px; flex-wrap:wrap; gap:10px; }
  .modal-title { font-size:1.2rem; font-weight:bold; letter-spacing:1.5px; }
  .modal-controls { display:flex; gap:6px; flex-wrap:wrap; }
  .modal-btn { padding:6px 12px; background:#1a1100; color:orange; border:1px solid orange; border-radius:5px; cursor:pointer; font-size:0.85rem; font-weight:bold; }
  .modal-btn:hover { background:#2a1a00; }
  #modalContent { flex:1; overflow:auto; border:1px solid orange; border-radius:8px; background:#0b0b0b; padding:10px; }
  #modalContent svg { display:block; width:var(--zoom-w,100%); max-width:none; height:auto; transition:width .15s ease; }
  .modal-hint { color:#ffb84d; font-size:0.8rem; font-style:italic; text-align:center; margin-top:6px; }
</style>
</head>

    </div>
    <div id="modalContent"></div>

  L.rowList.forEach((r,ri)=>{ L.colList.forEach((c,ci)=>{ const x=X0+ci*DX, y=Y0+ri*DY; s+='<circle class="cb-empty" cx="'+x+'" cy="'+y+'" r="'+R+'"/>'; }); });
  for(const cb of cbs){ const pp=parsePos(cb.gridpos); const xy=cellXY(p,pp); if(!xy) continue;
    s+='<circle class="cb" data-id="'+cb.id+'" cx="'+xy.x+'" cy="'+xy.y+'" r="'+R+'"/>';
    s+='<text class="dotlabel" x="'+xy.x+'" y="'+(xy.y-12)+'">'+shortLabel(cb.name)+'</text>';
  }
  s+='</svg>';
  return s;
}
const PANEL_SVGS={};
for(const p of PANEL_ORDER){ PANEL_SVGS[p]=buildPanelSVG(p); }

const panelSel=document.getElementById('panelFilter');
for(const p of PANEL_ORDER){ const o=document.createElement('option'); o.value=p; o.textContent=panelLabel(p); panelSel.appendChild(o); }
const ataSel=document.getElementById('ataFilter');
for(const a of [...new Set(CB_DATA.map(c=>c.ata))].sort((x,y)=>parseInt(x)-parseInt(y))){ const o=document.createElement('option'); o.value=a; o.textContent='ATA '+a; ataSel.appendChild(o); }

const tabsDiv=document.getElementById('panelTabs');
PANEL_ORDER.forEach((p,i)=>{ const t=document.createElement('button'); t.className='tab'+(i===0?' active':''); t.textContent=panelLabel(p); t.dataset.panel=p; t.onclick=()=>showPanel(p); tabsDiv.appendChild(t); });

const display=document.getElementById('panelDisplay');
const noteEl=document.getElementById('panelNote');
let currentPanel=PANEL_ORDER[0]; let curId=null;

function labelFor(c){ const parts=[]; if(c.pos) parts.push(c.pos); if(c.fin) parts.push(c.fin); if(c.name) parts.push(c.name); return parts.join('  ').substring(0,52); }

function showPanel(p){
  currentPanel=p;
  document.querySelectorAll('#panelTabs .tab').forEach(t=>t.classList.toggle('active', t.dataset.panel===p));
  display.innerHTML=PANEL_SVGS[p]||'';
  const n=CB_DATA.filter(c=>c.panel===p).length;
  noteEl.textContent=(PANEL_DESC[p]||'')+' \u2022 '+n+' catalogued CB'+(n===1?'':'s');
  if(curId!=null) applyHighlight(display,curId);
}

function applyHighlight(container,id){
  container.querySelectorAll('circle.highlight').forEach(c=>c.classList.remove('highlight'));
  container.querySelectorAll('.callout-group').forEach(el=>el.remove());
  if(id==null) return;
  const c=CB_BY_ID[id]; if(!c) return;
  const svg=container.querySelector('svg'); if(!svg) return;
  const dot=svg.querySelector('circle.cb[data-id="'+id+'"]'); if(!dot) return;
  dot.classList.add('highlight');
  const cx=parseFloat(dot.getAttribute('cx')), cy=parseFloat(dot.getAttribute('cy'));
  const ns='http://www.w3.org/2000/svg';
  const g=document.createElementNS(ns,'g'); g.setAttribute('class','callout-group');
  const labelY=cy+30;                       // below the dot, like the 737 tool
  const text=labelFor(c);
  const txt=document.createElementNS(ns,'text'); txt.setAttribute('x',cx); txt.setAttribute('y',labelY+1); txt.setAttribute('class','highlight-callout'); txt.textContent=text;
  svg.appendChild(txt); let tw=0; try{tw=txt.getBBox().width;}catch(e){tw=0;} if(!tw||!isFinite(tw)) tw=text.length*8; svg.removeChild(txt);
  const w=Math.max(60,tw+18);
  const vb=(svg.getAttribute('viewBox')||'0 0 800 400').split(/\s+/).map(parseFloat);
  let rx=cx-w/2; if(rx<vb[0]+4) rx=vb[0]+4; if(rx+w>vb[0]+vb[2]-4) rx=vb[0]+vb[2]-4-w;
  const tcx=rx+w/2; txt.setAttribute('x',tcx);
  const rect=document.createElementNS(ns,'rect'); rect.setAttribute('x',rx); rect.setAttribute('y',labelY-15); rect.setAttribute('width',w); rect.setAttribute('height',22); rect.setAttribute('rx',4); rect.setAttribute('class','highlight-callout-bg');
  g.appendChild(rect); g.appendChild(txt); svg.appendChild(g);
}

const searchBox=document.getElementById('searchBox');
const resultsBody=document.getElementById('resultsBody');
const countLabel=document.getElementById('countLabel');
function getFiltered(){
  const q=searchBox.value.trim().toLowerCase(); const terms=q.split(/\s+/).filter(Boolean);
  const pf=panelSel.value, af=ataSel.value;
  return CB_DATA.filter(c=>{
    if(pf && c.panel!==pf) return false;
    if(af && c.ata!==af) return false;
    if(terms.length){ const hay=(c.name+' '+c.pos+' '+c.fin+' '+c.panel+' ata'+c.ata+' '+(c.note||'')).toLowerCase(); for(const t of terms){ if(hay.indexOf(t)<0) return false; } }
    return true;
  });
}
function render(){
  const rows=getFiltered();
  countLabel.textContent=rows.length+' of '+CB_DATA.length+' circuit breakers';
  resultsBody.innerHTML='';
  const frag=document.createDocumentFragment();
  for(const c of rows){
    const tr=document.createElement('tr');
    const inop=c.note==='Inop'?'<span class="inop">INOP</span>':'';
    const noteTxt=(c.note && c.note!=='Inop')?'<br><span style="color:#9c7028;font-size:0.74rem;font-style:italic">'+c.note+'</span>':'';
    tr.innerHTML='<td><span class="panel-tag">'+panelLabel(c.panel)+'</span></td>'+
                 '<td><span class="pos-tag">'+(c.pos||'\u2014')+'</span></td>'+
                 '<td>'+(c.fin?'<span class="fin-tag">'+c.fin+'</span>':'\u2014')+'</td>'+
                 '<td>'+c.name+inop+noteTxt+'</td>'+
                 '<td><span class="ata-tag">'+c.ata+'</span></td>';
    tr.onclick=()=>{
      resultsBody.querySelectorAll('tr.active').forEach(r=>r.classList.remove('active'));
      tr.classList.add('active'); curId=c.id;
      if(c.panel!==currentPanel) showPanel(c.panel); else applyHighlight(display,curId);
    };
    frag.appendChild(tr);
  }
  resultsBody.appendChild(frag);
}
searchBox.addEventListener('input',render);
panelSel.addEventListener('change',()=>{ render(); if(panelSel.value) showPanel(panelSel.value); });
ataSel.addEventListener('change',render);
document.getElementById('clearBtn').onclick=()=>{ searchBox.value=''; panelSel.value=''; ataSel.value=''; render(); };

const modal=document.getElementById('modal'); const modalContent=document.getElementById('modalContent'); const modalTitle=document.getElementById('modalTitle');
let zoom=1;
function openModal(){
  if(!PANEL_SVGS[currentPanel]) return;
  modalTitle.textContent=panelLabel(currentPanel)+'  \u2014  '+(PANEL_DESC[currentPanel]||'');
  modalContent.innerHTML=PANEL_SVGS[currentPanel]||''; zoom=1;
  const svg=modalContent.querySelector('svg'); if(svg) svg.style.setProperty('--zoom-w','100%');
  modal.classList.add('open');                 // make visible FIRST so getBBox can measure
  if(curId!=null) applyHighlight(modalContent,curId);
}
function setZoom(z){ zoom=Math.max(0.5,Math.min(6,z)); const svg=modalContent.querySelector('svg'); if(svg) svg.style.setProperty('--zoom-w',(zoom*100)+'%'); }
display.onclick=openModal;
document.getElementById('enlargeBtn').onclick=(e)=>{e.stopPropagation();openModal();};
document.getElementById('closeModalBtn').onclick=()=>modal.classList.remove('open');
document.getElementById('zoomInBtn').onclick=()=>setZoom(zoom+0.25);
document.getElementById('zoomOutBtn').onclick=()=>setZoom(zoom-0.25);
document.getElementById('zoomFitBtn').onclick=()=>setZoom(1);
modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('open'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') modal.classList.remove('open'); });

showPanel(PANEL_ORDER[0]); render();
</script>
</body>
</html>
